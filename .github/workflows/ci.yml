name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o airflow-tui .

      - name: Run Go tests
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Airflow
        run: docker compose -f docker-compose.yaml up -d
        timeout-minutes: 5

      - name: Setup Python for e2e
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install test deps
        run: |
          uv venv e2e/.venv
          source e2e/.venv/bin/activate
          uv pip install pytest pytest-xdist pytest-timeout pexpect requests

      - name: Wait for Airflow
        run: |
          for i in {1..30}; do
            nc -z localhost 8080 && exit 0
            sleep 2
          done
          exit 1

      - name: Run e2e tests
        run: e2e/.venv/bin/python -m pytest e2e/test_tui.py -v --timeout=60
        timeout-minutes: 10